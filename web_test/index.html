<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#e8e4dc" />
    <script>
      window.SENDBOT_THEME_CSS_V = "?v=20260524";
    </script>
    <link
      rel="stylesheet"
      href="/theme-light.css?v=20260524"
      id="sendbot-theme-light"
      title="sendbot-theme"
    />
    <link
      rel="stylesheet"
      href="/theme-dark.css?v=20260524"
      id="sendbot-theme-dark"
      title="sendbot-theme"
    />
    <script>
      (function () {
        var PAGE_BG = { light: "#e8e4dc", dark: "#0f1419" };
        var theme = "light";
        try {
          var t = localStorage.getItem("sendbot_theme");
          if (t === "dark" || t === "light") theme = t;
        } catch (e) { /* ignore */ }
        var html = document.documentElement;
        html.setAttribute("data-theme", theme);
        html.style.colorScheme = theme;
        html.style.backgroundColor = PAGE_BG[theme];
        function meta(name, content) {
          var el = document.querySelector('meta[name="' + name + '"]');
          if (!el) {
            el = document.createElement("meta");
            el.setAttribute("name", name);
            document.head.appendChild(el);
          }
          el.setAttribute("content", content);
        }
        meta("color-scheme", theme);
        meta("theme-color", PAGE_BG[theme]);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SendBot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
