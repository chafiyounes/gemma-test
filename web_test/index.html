<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f4f6f9" />
    <script>
      window.SENDBOT_THEME_CSS_V = "?v=20260620";
      (function () {
        var PAGE_BG = { light: "#f4f6f9", dark: "#0f1419" };
        var theme = "light";
        try {
          var t = localStorage.getItem("sendbot_theme");
          if (t === "dark" || t === "light") theme = t;
        } catch (e) { /* ignore */ }
        var v = window.SENDBOT_THEME_CSS_V || "";
        ["light", "dark"].forEach(function (mode) {
          var link = document.getElementById("sendbot-theme-" + mode);
          if (!link) {
            link = document.createElement("link");
            link.id = "sendbot-theme-" + mode;
            link.rel = "stylesheet";
            link.title = "sendbot-theme";
            link.href = "/theme-" + mode + ".css" + v;
            document.head.appendChild(link);
          }
          link.disabled = mode !== theme;
        });
        var html = document.documentElement;
        html.setAttribute("data-theme", theme);
        html.style.colorScheme = theme;
        html.style.backgroundColor = PAGE_BG[theme];
        function meta(name, content) {
          var el = document.querySelector('meta[name="' + name + '"]');
          if (!el) {
            el = document.createElement("meta");
            el.setAttribute("name", name);
            document.head.appendChild(el);
          }
          el.setAttribute("content", content);
        }
        meta("color-scheme", theme);
        meta("theme-color", PAGE_BG[theme]);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SendBot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
